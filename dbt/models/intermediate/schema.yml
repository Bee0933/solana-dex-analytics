version: 2

models:
  - name: int_pool_metrics
    description: >
      Pool-level metrics enriched with volume share percentages, fee rate,
      volume-to-TVL ratio, 7-day rolling average, and week-over-week change.
      One row per (pool_address, snapshot_date) — same grain as stg_dex_pools.

  - name: int_market_share_metrics
    description: >
      DEX-level market share percentages derived from DefiLlama volumes.
      Adds rolling 7-day average share and deviation from that average.
      One row per (dex_name, snapshot_date) — same grain as stg_dex_market_share.
